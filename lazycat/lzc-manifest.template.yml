application:
  subdomain: apipark
  upstreams:
    - location: /
      backend: http://main:8288
  public_path:
    - /

services:
  main:
    image: ${LAZYCAT_IMAGE}
    environment:
      - TZ=Asia/Shanghai
      # MySQL
      - MYSQL_IP=mysql
      - MYSQL_PORT=3306
      - MYSQL_DB=apipark
      - MYSQL_USER_NAME=root
      - MYSQL_PWD={{stable_secret "MYSQL_ROOT_PASSWORD"}}
      # Redis
      - REDIS_ADDR=redis:6379
      - REDIS_PWD={{stable_secret "REDIS_PASSWORD"}}
      # Logging
      - ERROR_DIR=work/logs
      - ERROR_FILE_NAME=error.log
      - ERROR_LOG_LEVEL=info
      - ERROR_EXPIRE=7d
      - ERROR_PERIOD=day
      # Admin bootstrap (default: 12345678 — change it via APIPark UI after first login)
      - ADMIN_PASSWORD=12345678
    binds:
      - /lzcapp/var/logs:/apipark/work/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8288/api/v1/account/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      # apipark waits for mysql in its own entrypoint (up to 10min),
      # so its TCP-listen can lag the container being marked Up.
      start_period: 600s
    depends_on:
      - mysql
      - redis
      - apipark-nsq

  mysql:
    image: registry.lazycat.cloud/lee/library/mysql:af58d7dde530c490
    command: >
      mysqld
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD={{stable_secret "MYSQL_ROOT_PASSWORD"}}
      - MYSQL_DATABASE=apipark
    binds:
      - /lzcapp/var/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      # MySQL 8 first-boot init takes 3-4 min on lazycat boxes.
      start_period: 300s

  redis:
    image: registry.lazycat.cloud/lee/library/redis:5213762bb18e770c
    command: >
      redis-server
      --protected-mode yes
      --appendonly no
      --port 6379
      --requirepass {{stable_secret "REDIS_PASSWORD"}}
    environment:
      - TZ=Asia/Shanghai
    binds:
      - /lzcapp/var/redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - '{{stable_secret "REDIS_PASSWORD"}}'
        - ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  apipark-nsq:
    # Image bakes ENV NSQ_ADDR=apipark-nsq:4150, so the service hostname
    # must match exactly.
    image: registry.lazycat.cloud/lee/nsqio/nsq:1c9fb20069f23c53
    command: /nsqd --data-path=/data
    environment:
      - TZ=Asia/Shanghai
    binds:
      - /lzcapp/var/nsq:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:4151/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
